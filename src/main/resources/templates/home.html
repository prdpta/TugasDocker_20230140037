<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - Data Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">MY Website 20230140037</h2>
            <p class="text-secondary">Selamat datang di aplikasi!</p>
        </div>
        <a th:href="@{/logout}" class="btn btn-outline-danger shadow-sm">Logout</a>
    </div>

    <div class="mb-3">
        <a th:href="@{/form}" class="btn btn-primary shadow-sm">+ Input Data Mahasiswa</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Data Mahasiswa</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-primary">
                <tr>
                    <th class="px-4">No</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u, stat : ${users}">
                    <td class="px-4" th:text="${stat.count}">1</td>
                    <td th:text="${u.nama}">Dipta</td>
                    <td th:text="${u.nim}">20230140037</td>
                    <td th:text="${u.jenisKelamin}">Laki-laki</td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" class="text-center py-4 text-muted">Belum ada data tersedia.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
