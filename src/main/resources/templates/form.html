<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Input Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 text-center">Form Input Data Diri</h4>
                    <p class="mb-0 text-center small">NIM : 20230140037</p>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/simpan}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama</label>
                            <input type="text" th:field="*{nama}" class="form-control" placeholder="Masukkan Nama Lengkap" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">NIM</label>
                            <input type="text" th:field="*{nim}" class="form-control" placeholder="Masukkan NIM" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold d-block">Jenis Kelamin</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" id="l" required>
                                <label class="form-check-label" for="l">Laki-laki</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan" id="p">
                                <label class="form-check-label" for="p">Perempuan</label>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/home}" class="btn btn-secondary px-4">Kembali ke Home</a>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Simpan Data</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
